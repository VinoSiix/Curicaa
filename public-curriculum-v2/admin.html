<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Curicaa — Admin Dashboard</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0f1119;--bg-card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:rgba(255,255,255,0.88);--text-secondary:rgba(255,255,255,0.65);--text-muted:rgba(255,255,255,0.45);--gold:#d4a54a;--green:#4ade80;--red:#f87171;--blue:#60a5fa}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',system-ui,sans-serif}
        body{background:var(--bg);min-height:100vh;color:var(--text);padding:40px 20px;-webkit-font-smoothing:antialiased}
        .container{max-width:900px;margin:0 auto}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#f97316);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;color:white}
        .logo-text{font-weight:700;font-size:16px}
        .logo-sub{font-size:11px;color:var(--text-muted)}
        .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
        .badge-gold{background:rgba(212,165,74,0.12);border:1px solid rgba(212,165,74,0.25);color:var(--gold)}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
        .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        .stat-card{text-align:center;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px}
        .stat-num{font-size:32px;font-weight:800;letter-spacing:-0.03em}
        .stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:12px 14px;font-weight:600;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
        td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
        tr:hover td{background:rgba(212,165,74,0.04)}
        .empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}
        .empty-state i{font-size:32px;margin-bottom:12px;opacity:0.4}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#f97316);color:white}
        .btn-subtle{background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary)}
        .btn:hover{opacity:0.85}
        .search-wrap{margin-bottom:16px}
        .search-input{width:100%;padding:10px 14px 10px 38px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
        .search-input:focus{border-color:rgba(212,165,74,0.4)}
        .search-input::placeholder{color:var(--text-muted)}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px}
        .tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
        .tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s}
        .tab:hover{color:var(--text-secondary)}
        .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
        .tab-content{display:none}
        .tab-content.active{display:block}

        /* Login gate */
        #loginGate{display:flex;align-items:center;justify-content:center;min-height:80vh}
        .gate-box{text-align:center;max-width:400px;width:100%}
        .gate-box .logo-icon{margin:0 auto 16px}
        .gate-input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:14px;outline:none;margin-top:20px;transition:border-color 0.2s}
        .gate-input:focus{border-color:rgba(212,165,74,0.5)}
        .gate-input::placeholder{color:var(--text-muted)}
        .gate-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#f97316);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit}
        .gate-btn:disabled{opacity:0.5;cursor:not-allowed}
        .gate-error{color:var(--red);font-size:12px;margin-top:10px;display:none}
        .gate-locked{color:var(--red);font-size:13px;margin-top:14px;font-weight:600}

        #dashboard{display:none}

        @media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;align-items:flex-start}}
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div id="loginGate">
        <div class="gate-box">
            <div class="logo-icon">🔒</div>
            <div style="font-weight:700;font-size:18px;">Admin Dashboard</div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">Enter password to continue</div>
            <input type="password" class="gate-input" id="gatePassword" placeholder="Password" autocomplete="off">
            <button class="gate-btn" id="gateBtn">Unlock</button>
            <div class="gate-error" id="gateError"></div>
        </div>
    </div>

    <!-- Dashboard (hidden until password verified) -->
    <div id="dashboard" class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <div>
                    <div class="logo-text">Curicaa Dashboard</div>
                    <div class="logo-sub">Admin</div>
                </div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="btn btn-subtle" onclick="refreshAll()"><i class="fas fa-sync-alt" style="font-size:11px;"></i> Refresh</button>
                <a class="btn btn-subtle" href="hub.html">← Back to Site</a>
                <button class="btn btn-subtle" onclick="lockDashboard()"><i class="fas fa-sign-out-alt" style="font-size:11px;"></i> Lock</button>
            </div>
        </div>

        <div class="stat-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-num" id="statWaitlist" style="color:var(--gold);">—</div>
                <div class="stat-label">Waitlist Emails</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statUsers" style="color:var(--green);">—</div>
                <div class="stat-label">Registered Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statToday" style="color:var(--blue);">—</div>
                <div class="stat-label">New Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statThisWeek" style="color:#a78bfa;">—</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <div class="tab active" data-tab="waitlist">Waitlist</div>
            <div class="tab" data-tab="users">Users</div>
        </div>

        <!-- Waitlist Tab -->
        <div class="tab-content active" id="tab-waitlist">
            <div class="search-wrap" style="position:relative;">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchWaitlist" placeholder="Search waitlist emails..." oninput="filterWaitlist()">
            </div>
            <div class="card" style="padding:0;overflow:hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Email</th>
                            <th>Signed Up</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="waitlistBody">
                        <tr><td colspan="4" class="empty-state"><div><i class="fas fa-inbox"></i><div>Loading...</div></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div style="text-align:center;margin-top:20px;">
                <button class="btn btn-gold" onclick="exportWaitlistCSV()"><i class="fas fa-download" style="font-size:11px;"></i> Export Waitlist CSV</button>
            </div>
        </div>

        <!-- Users Tab -->
        <div class="tab-content" id="tab-users">
            <div class="search-wrap" style="position:relative;">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchUsers" placeholder="Search users..." oninput="filterUsers()">
            </div>
            <div class="card" style="padding:0;overflow:hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="5" class="empty-state"><div><i class="fas fa-inbox"></i><div>Loading...</div></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div style="text-align:center;margin-top:20px;">
                <button class="btn btn-gold" onclick="exportUsersCSV()"><i class="fas fa-download" style="font-size:11px;"></i> Export Users CSV</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function () {
        var SUPABASE_URL = 'https://muhtsytbbdzkfeiugdoo.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11aHRzeXRiYmR6a2ZlaXVnZG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTYyNzMsImV4cCI6MjA5Mzg3MjI3M30.JOr0rv0K_GBSarVq8VXFMhCGnznRZz4LZWA2JaPwEWQ';

        // Stored hash — the actual password is never in source code
        var ADMIN_HASH = '7400f452403798907ebc27bffcb46298f32b46765ad5a68443463ea0e1f2cab6';

        var MAX_ATTEMPTS = 3;
        var LOCKOUT_MINUTES = 30;
        var LOCKOUT_KEY = 'curicaa_admin_lockout';
        var ATTEMPTS_KEY = 'curicaa_admin_attempts';
        var SESSION_KEY = 'curicaa_admin_session';

        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var waitlistRows = [];
        var userRows = [];

        var gateEl = document.getElementById('loginGate');
        var dashEl = document.getElementById('dashboard');

        // ─── SHA-256 hash ───
        async function sha256(text) {
            var encoder = new TextEncoder();
            var data = encoder.encode(text);
            var hashBuffer = await crypto.subtle.digest('SHA-256', data);
            var hashArray = Array.from(new Uint8Array(hashBuffer));
            var hexParts = [];
            for (var i = 0; i < hashArray.length; i++) {
                var hex = hashArray[i].toString(16);
                hexParts.push(hex.length === 1 ? '0' + hex : hex);
            }
            return hexParts.join('');
        }

        // ─── Attempt tracking ───
        function getAttempts() {
            try {
                var stored = sessionStorage.getItem(ATTEMPTS_KEY);
                if (!stored) return { count: 0, lockedAt: null };
                return JSON.parse(stored);
            } catch(e) { return { count: 0, lockedAt: null }; }
        }

        function isLockedOut() {
            var attempts = getAttempts();
            if (attempts.count < MAX_ATTEMPTS) return false;
            if (!attempts.lockedAt) return false;
            var elapsed = Date.now() - attempts.lockedAt;
            if (elapsed > LOCKOUT_MINUTES * 60 * 1000) {
                sessionStorage.removeItem(ATTEMPTS_KEY);
                return false;
            }
            return true;
        }

        function getLockoutRemaining() {
            var attempts = getAttempts();
            if (!attempts.lockedAt) return 0;
            var elapsed = Date.now() - attempts.lockedAt;
            var remaining = Math.ceil((LOCKOUT_MINUTES * 60 * 1000 - elapsed) / 60000);
            return remaining > 0 ? remaining : 0;
        }

        function recordFailedAttempt() {
            var attempts = getAttempts();
            attempts.count = (attempts.count || 0) + 1;
            if (attempts.count >= MAX_ATTEMPTS) {
                attempts.lockedAt = Date.now();
            }
            sessionStorage.setItem(ATTEMPTS_KEY, JSON.stringify(attempts));
            return attempts.count;
        }

        function clearAttempts() {
            sessionStorage.removeItem(ATTEMPTS_KEY);
        }

        // ─── Session persistence (page refresh keeps you logged in) ───
        function createSession() {
            try {
                sessionStorage.setItem(SESSION_KEY, '1');
            } catch(e) {}
        }

        function hasSession() {
            try {
                return sessionStorage.getItem(SESSION_KEY) === '1';
            } catch(e) { return false; }
        }

        function destroySession() {
            sessionStorage.removeItem(SESSION_KEY);
        }

        // ─── Dashboard ───
        function showDashboard() {
            createSession();
            gateEl.style.display = 'none';
            dashEl.style.display = 'block';
            loadData();
        }

        function showGate(errorMsg) {
            dashEl.style.display = 'none';
            gateEl.style.display = 'flex';
            document.getElementById('gatePassword').value = '';
            var errorEl = document.getElementById('gateError');
            if (errorMsg) {
                errorEl.textContent = errorMsg;
                errorEl.style.display = 'block';
            } else {
                errorEl.style.display = 'none';
            }
        }

        // ─── Boot ───
        function boot() {
            if (hasSession() && !isLockedOut()) {
                showDashboard();
                return;
            }

            showGate();
            updateGateState();
        }

        function updateGateState() {
            var btn = document.getElementById('gateBtn');
            var pwField = document.getElementById('gatePassword');
            var errorEl = document.getElementById('gateError');

            if (isLockedOut()) {
                var remaining = getLockoutRemaining();
                btn.disabled = true;
                pwField.disabled = true;
                errorEl.textContent = 'Too many attempts. Try again in ' + remaining + ' minute' + (remaining !== 1 ? 's' : '') + '.';
                errorEl.style.display = 'block';
                // Auto-refresh lockout timer
                setTimeout(updateGateState, 10000);
            } else {
                btn.disabled = false;
                pwField.disabled = false;
                var attempts = getAttempts();
                if (attempts.count > 0) {
                    errorEl.textContent = 'Incorrect password. ' + (MAX_ATTEMPTS - attempts.count) + ' attempt' + ((MAX_ATTEMPTS - attempts.count) !== 1 ? 's' : '') + ' remaining.';
                    errorEl.style.display = 'block';
                }
            }
        }

        // ─── Password verification ───
        async function verifyPassword(input) {
            var hash = await sha256(input);
            return hash === ADMIN_HASH;
        }

        document.getElementById('gateBtn').addEventListener('click', handleUnlock);
        document.getElementById('gatePassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleUnlock();
        });

        async function handleUnlock() {
            if (isLockedOut()) return;

            var password = document.getElementById('gatePassword').value;
            if (!password) return;

            var btn = document.getElementById('gateBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            var match = await verifyPassword(password);

            if (match) {
                clearAttempts();
                btn.textContent = 'Unlock';
                showDashboard();
            } else {
                btn.disabled = false;
                btn.textContent = 'Unlock';
                var count = recordFailedAttempt();
                var remaining = MAX_ATTEMPTS - count;
                if (remaining <= 0) {
                    updateGateState();
                } else {
                    var errorEl = document.getElementById('gateError');
                    errorEl.textContent = 'Incorrect password. ' + remaining + ' attempt' + (remaining !== 1 ? 's' : '') + ' remaining.';
                    errorEl.style.display = 'block';
                }
                document.getElementById('gatePassword').value = '';
                document.getElementById('gatePassword').focus();
            }
        }

        window.lockDashboard = function () {
            destroySession();
            showGate();
        };

        // ─── Data loading (direct queries) ───
        function loadData() {
            Promise.all([
                client.from('waitlist').select('*').order('created_at', { ascending: false }).limit(500),
                client.from('profiles').select('*').order('created_at', { ascending: false }).limit(500)
            ]).then(function(results) {
                var wlResult = results[0];
                var uResult = results[1];

                if (wlResult.error) {
                    document.getElementById('waitlistBody').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;color:#f87171;">Error: ' + escapeHtml(wlResult.error.message) + '</td></tr>';
                } else {
                    waitlistRows = wlResult.data || [];
                    renderWaitlistTable(waitlistRows);
                }

                if (uResult.error) {
                    document.getElementById('usersBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#f87171;">Error: ' + escapeHtml(uResult.error.message) + '</td></tr>';
                } else {
                    userRows = uResult.data || [];
                    renderUsersTable(userRows);
                }

                updateStats();
            });
        }

        // ─── Tabs ───
        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // ─── Render functions ───
        function renderWaitlistTable(rows) {
            var tbody = document.getElementById('waitlistBody');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted);"><i class="fas fa-inbox" style="font-size:24px;display:block;margin-bottom:8px;opacity:0.4;"></i>No waitlist emails yet</td></tr>';
                return;
            }
            var html = '';
            rows.forEach(function (row, i) {
                var date = new Date(row.created_at);
                var dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                var timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                html += '<tr><td style="color:var(--text-muted);">' + (i + 1) + '</td>' +
                    '<td style="font-weight:600;color:var(--text);">' + escapeHtml(row.email) + '</td>' +
                    '<td>' + dateStr + ' <span style="color:var(--text-muted);font-size:11px;">' + timeStr + '</span></td>' +
                    '<td><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(212,165,74,0.1);color:var(--gold);">' + escapeHtml(row.source || 'landing_page') + '</span></td></tr>';
            });
            tbody.innerHTML = html;
        }

        function renderUsersTable(rows) {
            var tbody = document.getElementById('usersBody');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted);"><i class="fas fa-inbox" style="font-size:24px;display:block;margin-bottom:8px;opacity:0.4;"></i>No registered users yet</td></tr>';
                return;
            }
            var html = '';
            rows.forEach(function (row, i) {
                var date = new Date(row.created_at);
                var dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                var planColor = { free: 'var(--text-muted)', single: 'var(--gold)', bundle: 'var(--blue)', pro: '#a78bfa' }[row.plan] || 'var(--text-muted)';
                html += '<tr><td style="color:var(--text-muted);">' + (i + 1) + '</td>' +
                    '<td style="font-weight:600;color:var(--text);">' + escapeHtml(row.name || '—') + '</td>' +
                    '<td>' + escapeHtml(row.email) + '</td>' +
                    '<td><span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;color:' + planColor + ';background:' + planColor.replace(')', ',0.1)').replace('var(--', 'rgba(') + ';">' + escapeHtml(row.plan || 'free') + '</span></td>' +
                    '<td>' + dateStr + '</td></tr>';
            });
            tbody.innerHTML = html;
        }

        function updateStats() {
            document.getElementById('statWaitlist').textContent = waitlistRows.length;
            document.getElementById('statUsers').textContent = userRows.length;
            var now = new Date();
            var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            var weekStart = new Date(now);
            weekStart.setDate(weekStart.getDate() - weekStart.getDay());
            weekStart.setHours(0, 0, 0, 0);
            var todayCount = 0, weekCount = 0;
            waitlistRows.concat(userRows).forEach(function (row) {
                var d = new Date(row.created_at);
                if (d >= todayStart) todayCount++;
                if (d >= weekStart) weekCount++;
            });
            document.getElementById('statToday').textContent = todayCount;
            document.getElementById('statThisWeek').textContent = weekCount;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }

        window.refreshAll = function () { loadData(); };

        window.filterWaitlist = function () {
            var q = document.getElementById('searchWaitlist').value.trim().toLowerCase();
            renderWaitlistTable(q ? waitlistRows.filter(function(r){return r.email.toLowerCase().indexOf(q)!==-1;}) : waitlistRows);
        };

        window.filterUsers = function () {
            var q = document.getElementById('searchUsers').value.trim().toLowerCase();
            renderUsersTable(q ? userRows.filter(function(r){return r.name.toLowerCase().indexOf(q)!==-1||r.email.toLowerCase().indexOf(q)!==-1;}) : userRows);
        };

        window.exportWaitlistCSV = function () {
            if (!waitlistRows.length) { alert('No data.'); return; }
            var csv = 'Email,Signed Up,Source\n';
            waitlistRows.forEach(function(r){csv+='"'+r.email+'","'+r.created_at+'","'+(r.source||'landing_page')+'"\n';});
            downloadCSV(csv, 'curicaa-waitlist');
        };

        window.exportUsersCSV = function () {
            if (!userRows.length) { alert('No data.'); return; }
            var csv = 'Name,Email,Plan,Joined\n';
            userRows.forEach(function(r){csv+='"'+(r.name||'')+'","'+r.email+'","'+(r.plan||'free')+'","'+r.created_at+'"\n';});
            downloadCSV(csv, 'curicaa-users');
        };

        function downloadCSV(csv, prefix) {
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = prefix + '-' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        boot();
    })();
    </script>
</body>
</html>
