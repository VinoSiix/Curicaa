<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant B — Timeline Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #04040e; color: white; min-height: 100vh; overflow-x: hidden; }

        .bg-orb { position: fixed; border-radius: 50%; filter: blur(110px); pointer-events: none; z-index: 0; }
        .bg-orb-1 { width: 600px; height: 600px; background: #4f46e5; opacity: 0.11; top: -200px; left: -150px; }
        .bg-orb-2 { width: 500px; height: 500px; background: #7c3aed; opacity: 0.09; top: 30%; right: -100px; }

        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(4,4,14,0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 32px; display: flex; align-items: center; gap: 12px;
        }
        .logo { width: 32px; height: 32px; background: linear-gradient(135deg,#818cf8,#c084fc); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; }

        main { position: relative; z-index: 1; padding: 56px 32px 80px; max-width: 1060px; margin: 0 auto; }

        /* Hero */
        .hero { text-align: center; margin-bottom: 72px; }
        .hero-pill { display: inline-flex; align-items: center; gap: 7px; padding: 4px 14px; border-radius: 100px; background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.22); font-size: 10.5px; font-weight: 600; color: #a5b4fc; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 22px; }
        .hero-title { font-size: clamp(36px,5vw,60px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px; background: linear-gradient(135deg,#c4b5fd,#818cf8,#67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-sub { font-size: 15px; color: rgba(255,255,255,0.4); max-width: 460px; margin: 0 auto; line-height: 1.65; }

        /* Timeline container */
        .timeline-wrapper { position: relative; }

        /* Horizontal connecting line */
        .timeline-line {
            position: absolute;
            top: 52px; left: 60px; right: 60px; height: 2px;
            background: linear-gradient(90deg, rgba(168,85,247,0.6), rgba(59,130,246,0.6), rgba(16,185,129,0.6), rgba(249,115,22,0.6), rgba(99,102,241,0.6), rgba(239,68,68,0.6), rgba(234,179,8,0.6));
            z-index: 0;
        }

        .timeline-track { display: flex; gap: 0; overflow-x: auto; padding-bottom: 8px; position: relative; z-index: 1; scroll-snap-type: x mandatory; }
        .timeline-track::-webkit-scrollbar { height: 4px; }
        .timeline-track::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 100px; }
        .timeline-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 100px; }

        .stage {
            flex: 1; min-width: 130px; display: flex; flex-direction: column; align-items: center;
            scroll-snap-align: start; cursor: pointer;
        }

        /* Node */
        .node-wrap { position: relative; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .node {
            width: 54px; height: 54px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease; position: relative; z-index: 1;
        }
        .stage:hover .node, .stage.active .node {
            transform: scale(1.15);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 24px var(--glow);
        }
        .stage-label { font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 2px; }
        .stage-age { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); text-align: center; }
        .stage.active .stage-label { color: white; }

        /* Detail panel */
        .detail-panel {
            margin-top: 40px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 24px; padding: 32px;
            transition: all 0.3s ease;
        }
        .detail-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px; }
        .detail-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .detail-meta { flex: 1; }
        .detail-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
        .detail-title { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 4px; }
        .detail-age { display: inline-block; padding: 3px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); margin-bottom: 8px; }
        .detail-desc { font-size: 13.5px; color: rgba(255,255,255,0.45); line-height: 1.6; }

        .subjects-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .subj {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 16px 14px;
            cursor: pointer; transition: all 0.22s;
        }
        .subj:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
        .subj-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-bottom: 10px; }
        .subj-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .subj-topics { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
        .subj-topic { font-size: 11px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 5px; }
        .subj-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <header>
        <div class="logo"><i class="fas fa-graduation-cap"></i></div>
        <span style="font-weight:700;font-size:15px;letter-spacing:-0.02em;">Curriculum Hub</span>
    </header>

    <main>
        <div class="hero">
            <div class="hero-pill"><i class="fas fa-route" style="font-size:9px;"></i> The Learning Journey</div>
            <h1 class="hero-title">K–12 Pathway</h1>
            <p class="hero-sub">Follow the journey from early childhood through college prep — each stage building on the last.</p>
        </div>

        <div class="timeline-wrapper">
            <div class="timeline-line"></div>
            <div class="timeline-track" id="track">
                <div class="stage active" onclick="selectStage('ages-5-7')" id="stage-ages-5-7" style="--glow:rgba(168,85,247,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#a855f7,#ec4899);">
                            <i class="fas fa-child"></i>
                        </div>
                    </div>
                    <div class="stage-label">Early Elem.</div>
                    <div class="stage-age">Ages 5–7</div>
                </div>
                <div class="stage" onclick="selectStage('age-8')" id="stage-age-8" style="--glow:rgba(59,130,246,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);">
                            <i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div class="stage-label">Grade 3</div>
                    <div class="stage-age">Age 8</div>
                </div>
                <div class="stage" onclick="selectStage('age-9')" id="stage-age-9" style="--glow:rgba(16,185,129,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#10b981,#34d399);">
                            <i class="fas fa-book"></i>
                        </div>
                    </div>
                    <div class="stage-label">Grade 4</div>
                    <div class="stage-age">Age 9</div>
                </div>
                <div class="stage" onclick="selectStage('age-10')" id="stage-age-10" style="--glow:rgba(249,115,22,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#f97316,#ef4444);">
                            <i class="fas fa-rocket"></i>
                        </div>
                    </div>
                    <div class="stage-label">Grade 5</div>
                    <div class="stage-age">Age 10</div>
                </div>
                <div class="stage" onclick="selectStage('ages-11-12')" id="stage-ages-11-12" style="--glow:rgba(99,102,241,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
                            <i class="fas fa-brain"></i>
                        </div>
                    </div>
                    <div class="stage-label">Middle Sch.</div>
                    <div class="stage-age">Ages 11–12</div>
                </div>
                <div class="stage" onclick="selectStage('age-14')" id="stage-age-14" style="--glow:rgba(239,68,68,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#ef4444,#ec4899);">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                    </div>
                    <div class="stage-label">High School</div>
                    <div class="stage-age">Age 14</div>
                </div>
                <div class="stage" onclick="selectStage('ages-15-18')" id="stage-ages-15-18" style="--glow:rgba(234,179,8,0.4);">
                    <div class="node-wrap">
                        <div class="node" style="background:linear-gradient(135deg,#eab308,#f97316);">
                            <i class="fas fa-trophy"></i>
                        </div>
                    </div>
                    <div class="stage-label">GED/SAT</div>
                    <div class="stage-age">Ages 15–18</div>
                </div>
            </div>

            <div class="detail-panel" id="detail"></div>
        </div>
    </main>

    <script>
        const data = {
            'ages-5-7': { title:'Early Elementary', age:'Ages 5–7', eyebrow:'Foundation Building', color:'#a855f7', icon:'fa-child', grad:'linear-gradient(135deg,#a855f7,#ec4899)', desc:'Core literacy and numeracy through hands-on discovery and creative play.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Counting','Shapes','Patterns','Addition']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Phonics','Sight words','Storytelling','Printing']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Animals','Weather','Plants','Senses']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Drawing','Music','Dance','Play']}]},
            'age-8': { title:'Grade 3', age:'Age 8', eyebrow:'Skill Development', color:'#3b82f6', icon:'fa-star', grad:'linear-gradient(135deg,#3b82f6,#06b6d4)', desc:'Transitioning to reading-to-learn with multiplication and fluent reading.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Times tables','Place value','Measurement','Word problems']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Fluency','Comprehension','Paragraphs','Spelling']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Observations','Life cycles','Simple machines','Predictions']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Color theory','Sports','Rhythm','3D art']}]},
            'age-9': { title:'Grade 4', age:'Age 9', eyebrow:'Knowledge Expansion', color:'#10b981', icon:'fa-book', grad:'linear-gradient(135deg,#10b981,#34d399)', desc:'Deeper analytical skills with longer projects and independent research.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Long division','Fractions','Area','Data']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Main idea','Essays','Research','Vocabulary']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Ecosystems','Electricity','Lab reports','Minerals']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Mixed media','Team sports','Art history','Music theory']}]},
            'age-10': { title:'Grade 5', age:'Age 10', eyebrow:'Advanced Basics', color:'#f97316', icon:'fa-rocket', grad:'linear-gradient(135deg,#f97316,#ef4444)', desc:'Essay writing, fractions, and research skills for middle school readiness.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Decimals','Ratios','Geometry','Statistics']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['5-para essays','Literary analysis','Citations','Debate']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Earth science','Research skills','Data analysis','Presentations']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Art analysis','Fitness goals','Perspective','Ceramics']}]},
            'ages-11-12': { title:'Middle School', age:'Ages 11–12', eyebrow:'Preparation Focus', color:'#6366f1', icon:'fa-brain', grad:'linear-gradient(135deg,#6366f1,#8b5cf6)', desc:'Pre-algebra, research essays, and independent study habits for high school.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Variables','Integers','Proportions','Geometry']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Argumentative','Research papers','Grammar','Literature']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Biology','Chemistry intro','Physics basics','Lab safety']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Digital design','Photography','Drama','Fitness']}]},
            'age-14': { title:'High School', age:'Age 14', eyebrow:'Critical Thinking', color:'#ef4444', icon:'fa-graduation-cap', grad:'linear-gradient(135deg,#ef4444,#ec4899)', desc:'Algebra I, academic writing, and college-level critical thinking foundations.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Linear equations','Inequalities','Functions','Polynomials']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Literary analysis','Persuasion','Grammar','World lit']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Biology','Lab methodology','Data interpretation','Reports']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Portfolio work','Art theory','Sports','Health']}]},
            'ages-15-18': { title:'GED/SAT Prep', age:'Ages 15–18', eyebrow:'Test Preparation', color:'#eab308', icon:'fa-trophy', grad:'linear-gradient(135deg,#eab308,#f97316)', desc:'Targeted SAT/ACT strategies, GED content review, and college readiness.',
                subjects:[{name:'Math',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',ic:'#60a5fa',dot:'#3b82f6',topics:['Algebra II','Geometry','Data analysis','Problem solving']},{name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',ic:'#34d399',dot:'#10b981',topics:['Evidence-based reading','Essay writing','Grammar','Vocabulary']},{name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',ic:'#c084fc',dot:'#a855f7',topics:['Life science','Physical science','Earth science','Data interpretation']},{name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',ic:'#f472b6',dot:'#ec4899',topics:['Portfolio','Career planning','Wellness','Electives']}]}
        };

        let active = 'ages-5-7';

        function selectStage(id) {
            document.getElementById('stage-' + active).classList.remove('active');
            active = id;
            document.getElementById('stage-' + id).classList.add('active');
            render();
        }

        function render() {
            const d = data[active];
            document.getElementById('detail').style.borderColor = d.color.replace(')', ',0.3)').replace('rgb','rgba').replace('#','rgba(').replace(',0.3)','') + '44';
            document.getElementById('detail').innerHTML = `
                <div class="detail-top">
                    <div class="detail-icon" style="background:${d.grad};"><i class="fas ${d.icon}" style="font-size:22px;"></i></div>
                    <div class="detail-meta">
                        <div class="detail-eyebrow">${d.eyebrow}</div>
                        <div class="detail-title" style="color:${d.color}">${d.title}</div>
                        <div class="detail-age">${d.age}</div>
                        <div class="detail-desc">${d.desc}</div>
                    </div>
                </div>
                <div class="subjects-row">
                    ${d.subjects.map(s => `
                        <div class="subj">
                            <div class="subj-icon" style="background:${s.color};"><i class="fas ${s.icon}" style="color:${s.ic};font-size:15px;"></i></div>
                            <div class="subj-name">${s.name}</div>
                            <div class="subj-topics">
                                ${s.topics.map(t => `<div class="subj-topic"><span class="subj-dot" style="background:${s.dot};"></span>${t}</div>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        render();
    </script>
</body>
</html>
