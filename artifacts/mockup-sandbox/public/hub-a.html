<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant A — Sidebar Nav</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #04040e; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        .bg-orb-1 { width: 500px; height: 500px; background: #6366f1; opacity: 0.12; top: -200px; left: -100px; }
        .bg-orb-2 { width: 400px; height: 400px; background: #7c3aed; opacity: 0.1; bottom: -100px; right: 20%; }

        header {
            position: relative; z-index: 10;
            background: rgba(4,4,14,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 14px 24px;
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .logo { width: 32px; height: 32px; background: linear-gradient(135deg,#818cf8,#c084fc); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
        .header-sub { margin-left: auto; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; }

        .layout { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

        /* Sidebar */
        aside {
            width: 240px; flex-shrink: 0;
            background: rgba(255,255,255,0.025);
            border-right: 1px solid rgba(255,255,255,0.07);
            overflow-y: auto; padding: 20px 12px;
        }
        .sidebar-label {
            font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.25);
            padding: 0 8px; margin-bottom: 8px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 11px;
            padding: 10px 10px; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; margin-bottom: 2px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.06); }
        .nav-item.active { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
        .nav-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
        .nav-text { flex: 1; }
        .nav-title { font-size: 13px; font-weight: 600; }
        .nav-age { font-size: 10.5px; color: rgba(255,255,255,0.38); }
        .nav-arrow { font-size: 10px; color: rgba(255,255,255,0.2); }
        .nav-item.active .nav-arrow { color: rgba(255,255,255,0.5); }

        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 32px 36px; }

        .content-header { margin-bottom: 28px; }
        .content-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 6px; }
        .content-title { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
        .content-badge {
            display: inline-block; padding: 3px 12px; border-radius: 100px;
            font-size: 11px; font-weight: 600; margin-left: 12px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            vertical-align: middle; position: relative; top: -2px;
        }
        .content-desc { font-size: 14px; color: rgba(255,255,255,0.45); margin-top: 8px; line-height: 1.6; }

        /* Subject cards grid */
        .subjects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
        .subject-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .subject-card:hover {
            background: rgba(255,255,255,0.075);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-3px);
        }
        .subject-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 17px; }
        .subject-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .subject-desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }
        .subject-topics { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 5px; }
        .topic-chip {
            font-size: 10.5px; font-weight: 500;
            padding: 2px 9px; border-radius: 100px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.55);
        }

        /* Info strip */
        .info-strip {
            display: flex; gap: 12px;
        }
        .info-card {
            flex: 1; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px; padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .info-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .info-label { font-size: 10.5px; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <header>
        <div class="logo"><i class="fas fa-graduation-cap"></i></div>
        <span class="logo-text">Curriculum Hub</span>
        <span class="header-sub">Educational Pathways</span>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside>
            <div class="sidebar-label">Grade Levels</div>

            <div class="nav-item active" onclick="selectGrade('ages-5-7')" id="nav-ages-5-7">
                <div class="nav-icon" style="background:linear-gradient(135deg,#a855f7,#ec4899);">
                    <i class="fas fa-child"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">Early Elementary</div>
                    <div class="nav-age">Ages 5–7</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('age-8')" id="nav-age-8">
                <div class="nav-icon" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);">
                    <i class="fas fa-star"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">Grade 3</div>
                    <div class="nav-age">Age 8</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('age-9')" id="nav-age-9">
                <div class="nav-icon" style="background:linear-gradient(135deg,#10b981,#34d399);">
                    <i class="fas fa-book"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">Grade 4</div>
                    <div class="nav-age">Age 9</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('age-10')" id="nav-age-10">
                <div class="nav-icon" style="background:linear-gradient(135deg,#f97316,#ef4444);">
                    <i class="fas fa-rocket"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">Grade 5</div>
                    <div class="nav-age">Age 10</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('ages-11-12')" id="nav-ages-11-12">
                <div class="nav-icon" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">Middle School</div>
                    <div class="nav-age">Ages 11–12</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('age-14')" id="nav-age-14">
                <div class="nav-icon" style="background:linear-gradient(135deg,#ef4444,#ec4899);">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">High School</div>
                    <div class="nav-age">Age 14</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>

            <div class="nav-item" onclick="selectGrade('ages-15-18')" id="nav-ages-15-18">
                <div class="nav-icon" style="background:linear-gradient(135deg,#eab308,#f97316);">
                    <i class="fas fa-trophy"></i>
                </div>
                <div class="nav-text">
                    <div class="nav-title">GED/SAT Prep</div>
                    <div class="nav-age">Ages 15–18</div>
                </div>
                <i class="fas fa-chevron-right nav-arrow"></i>
            </div>
        </aside>

        <!-- Main content -->
        <div class="content" id="content">
            <!-- Filled by JS -->
        </div>
    </div>

    <script>
        const grades = {
            'ages-5-7': {
                title: 'Early Elementary', age: 'Ages 5–7', eyebrow: 'Foundation Building',
                desc: 'Building core literacy and numeracy skills through hands-on discovery, creative play, and structured exploration.',
                color: '#a855f7', icon: 'fa-child',
                subjects: [
                    { id:'math', name:'Mathematics', icon:'fa-calculator', color:'rgba(59,130,246,0.18)', iconColor:'#60a5fa', desc:'Number sense & early arithmetic', topics:['Counting','Shapes','Patterns','Addition'] },

                ],
                info: [
                    { icon:'fa-calendar-alt', color:'rgba(99,102,241,0.18)', iconColor:'#818cf8', label:'Academic Year', value:'Sep – Jun' },
                    { icon:'fa-clock', color:'rgba(16,185,129,0.18)', iconColor:'#34d399', label:'Daily Learning', value:'2–3 hrs' },
                    { icon:'fa-layer-group', color:'rgba(249,115,22,0.18)', iconColor:'#fb923c', label:'Monthly Themes', value:'9 modules' }
                ]
            },
            'age-8': {
                title: 'Grade 3', age: 'Age 8', eyebrow: 'Skill Development',
                desc: 'Transitioning from learning to read, to reading to learn — with growing independence in all subjects.',
                color: '#3b82f6', icon: 'fa-star',
                subjects: [
                    { id:'math', name:'Mathematics', icon:'fa-calculator', color:'rgba(59,130,246,0.18)', iconColor:'#60a5fa', desc:'Multiplication & place value', topics:['Times tables','Place value','Measurement','Word problems'] },
                    { id:'english', name:'English', icon:'fa-book', color:'rgba(16,185,129,0.18)', iconColor:'#34d399', desc:'Fluent reading & writing', topics:['Fluency','Comprehension','Paragraphs','Spelling'] },
                    { id:'science', name:'Science', icon:'fa-flask', color:'rgba(168,85,247,0.18)', iconColor:'#c084fc', desc:'Scientific method basics', topics:['Observations','Predictions','Life cycles','Simple machines'] },
                    { id:'art', name:'Art & PE', icon:'fa-palette', color:'rgba(236,72,153,0.18)', iconColor:'#f472b6', desc:'Technique & teamwork', topics:['Color theory','Sports','Rhythm','3D art'] }
                ],
                info: [
                    { icon:'fa-calendar-alt', color:'rgba(99,102,241,0.18)', iconColor:'#818cf8', label:'Academic Year', value:'Sep – Jun' },
                    { icon:'fa-clock', color:'rgba(16,185,129,0.18)', iconColor:'#34d399', label:'Daily Learning', value:'3–4 hrs' },
                    { icon:'fa-layer-group', color:'rgba(249,115,22,0.18)', iconColor:'#fb923c', label:'Monthly Themes', value:'9 modules' }
                ]
            },
            'age-9': { title:'Grade 4', age:'Age 9', eyebrow:'Knowledge Expansion', desc:'Deepening analytical skills across all subjects with longer projects and independent research.', color:'#10b981', icon:'fa-book',
                subjects:[
                    {id:'math',name:'Mathematics',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',iconColor:'#60a5fa',desc:'Division & fractions intro',topics:['Long division','Fractions','Area','Data']},
                    {id:'english',name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',desc:'Comprehension & composition',topics:['Main idea','Essays','Research','Vocabulary']},
                    {id:'science',name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',iconColor:'#c084fc',desc:'Lab reports & experiments',topics:['Ecosystems','Electricity','Lab reports','Minerals']},
                    {id:'art',name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',iconColor:'#f472b6',desc:'Creative projects & fitness',topics:['Mixed media','Team sports','Art history','Music theory']}
                ],
                info:[{icon:'fa-calendar-alt',color:'rgba(99,102,241,0.18)',iconColor:'#818cf8',label:'Academic Year',value:'Sep – Jun'},{icon:'fa-clock',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',label:'Daily Learning',value:'3–4 hrs'},{icon:'fa-layer-group',color:'rgba(249,115,22,0.18)',iconColor:'#fb923c',label:'Monthly Themes',value:'9 modules'}]
            },
            'age-10': { title:'Grade 5', age:'Age 10', eyebrow:'Advanced Basics', desc:'Preparing for middle school with essay writing, fractions, and research skills across disciplines.', color:'#f97316', icon:'fa-rocket',
                subjects:[
                    {id:'math',name:'Mathematics',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',iconColor:'#60a5fa',desc:'Fractions, decimals & ratios',topics:['Decimals','Ratios','Geometry','Statistics']},
                    {id:'english',name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',desc:'Essay writing & analysis',topics:['5-para essays','Literary analysis','Citations','Debate']},
                    {id:'science',name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',iconColor:'#c084fc',desc:'Research & scientific writing',topics:['Earth science','Research skills','Data analysis','Presentations']},
                    {id:'art',name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',iconColor:'#f472b6',desc:'Art criticism & athletics',topics:['Art analysis','Fitness goals','Perspective','Ceramics']}
                ],
                info:[{icon:'fa-calendar-alt',color:'rgba(99,102,241,0.18)',iconColor:'#818cf8',label:'Academic Year',value:'Sep – Jun'},{icon:'fa-clock',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',label:'Daily Learning',value:'4 hrs'},{icon:'fa-layer-group',color:'rgba(249,115,22,0.18)',iconColor:'#fb923c',label:'Monthly Themes',value:'9 modules'}]
            },
            'ages-11-12': { title:'Middle School', age:'Ages 11–12', eyebrow:'Preparation Focus', desc:'Building the bridge to high school with pre-algebra, research essays, and independent study habits.', color:'#6366f1', icon:'fa-brain',
                subjects:[
                    {id:'math',name:'Mathematics',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',iconColor:'#60a5fa',desc:'Pre-algebra & number theory',topics:['Variables','Integers','Proportions','Geometry']},
                    {id:'english',name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',desc:'Research essays & rhetoric',topics:['Argumentative','Research papers','Grammar','Literature']},
                    {id:'science',name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',iconColor:'#c084fc',desc:'Advanced labs & lab reports',topics:['Biology','Chemistry intro','Physics basics','Lab safety']},
                    {id:'art',name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',iconColor:'#f472b6',desc:'Digital arts & performance',topics:['Digital design','Photography','Drama','Fitness']}
                ],
                info:[{icon:'fa-calendar-alt',color:'rgba(99,102,241,0.18)',iconColor:'#818cf8',label:'Academic Year',value:'Sep – Jun'},{icon:'fa-clock',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',label:'Daily Learning',value:'4–5 hrs'},{icon:'fa-layer-group',color:'rgba(249,115,22,0.18)',iconColor:'#fb923c',label:'Monthly Themes',value:'9 modules'}]
            },
            'age-14': { title:'High School', age:'Age 14', eyebrow:'Critical Thinking', desc:'Rigorous academic preparation with Algebra I, academic writing, and college-level critical thinking.', color:'#ef4444', icon:'fa-graduation-cap',
                subjects:[
                    {id:'math',name:'Mathematics',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',iconColor:'#60a5fa',desc:'Algebra I & functions',topics:['Linear equations','Inequalities','Functions','Polynomials']},
                    {id:'english',name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',desc:'Academic writing & literature',topics:['Literary analysis','Persuasion','Grammar','World lit']},
                    {id:'science',name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',iconColor:'#c084fc',desc:'Scientific analysis & research',topics:['Biology','Lab methodology','Data interpretation','Reports']},
                    {id:'art',name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',iconColor:'#f472b6',desc:'Advanced studio & athletics',topics:['Portfolio work','Art theory','Sports','Health']}
                ],
                info:[{icon:'fa-calendar-alt',color:'rgba(99,102,241,0.18)',iconColor:'#818cf8',label:'Academic Year',value:'Sep – Jun'},{icon:'fa-clock',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',label:'Daily Learning',value:'5 hrs'},{icon:'fa-layer-group',color:'rgba(249,115,22,0.18)',iconColor:'#fb923c',label:'Monthly Themes',value:'9 modules'}]
            },
            'ages-15-18': { title:'GED/SAT Prep', age:'Ages 15–18', eyebrow:'Test Preparation', desc:'Targeted exam preparation with SAT/ACT strategies, GED content review, and college readiness skills.', color:'#eab308', icon:'fa-trophy',
                subjects:[
                    {id:'math',name:'Mathematics',icon:'fa-calculator',color:'rgba(59,130,246,0.18)',iconColor:'#60a5fa',desc:'SAT Math & GED numeracy',topics:['Algebra II','Geometry','Data analysis','Problem solving']},
                    {id:'english',name:'English',icon:'fa-book',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',desc:'Reading comprehension & writing',topics:['Evidence-based reading','Essay writing','Grammar','Vocabulary']},
                    {id:'science',name:'Science',icon:'fa-flask',color:'rgba(168,85,247,0.18)',iconColor:'#c084fc',desc:'GED Science & reasoning',topics:['Life science','Physical science','Earth science','Data interpretation']},
                    {id:'art',name:'Art & PE',icon:'fa-palette',color:'rgba(236,72,153,0.18)',iconColor:'#f472b6',desc:'Portfolio & wellness',topics:['Portfolio','Career planning','Wellness','Electives']}
                ],
                info:[{icon:'fa-calendar-alt',color:'rgba(99,102,241,0.18)',iconColor:'#818cf8',label:'Academic Year',value:'Sep – Jun'},{icon:'fa-clock',color:'rgba(16,185,129,0.18)',iconColor:'#34d399',label:'Daily Learning',value:'5–6 hrs'},{icon:'fa-layer-group',color:'rgba(249,115,22,0.18)',iconColor:'#fb923c',label:'Monthly Themes',value:'9 modules'}]
            }
        };

        let active = 'ages-5-7';

        function selectGrade(id) {
            document.getElementById('nav-' + active).classList.remove('active');
            active = id;
            document.getElementById('nav-' + id).classList.add('active');
            renderContent();
        }

        function renderContent() {
            const g = grades[active];
            document.getElementById('content').innerHTML = `
                <div class="content-header">
                    <div class="content-eyebrow">${g.eyebrow}</div>
                    <div>
                        <span class="content-title" style="color:${g.color}">${g.title}</span>
                        <span class="content-badge">${g.age}</span>
                    </div>
                    <div class="content-desc">${g.desc}</div>
                </div>
                <div class="subjects-grid">
                    ${g.subjects.map(s => `
                        <div class="subject-card" onclick="window.location.href='${active}-${s.id}.html'">
                            <div class="subject-icon" style="background:${s.color};">
                                <i class="fas ${s.icon}" style="color:${s.iconColor};font-size:17px;"></i>
                            </div>
                            <div class="subject-name">${s.name}</div>
                            <div class="subject-desc">${s.desc}</div>
                            <div class="subject-topics">${s.topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="info-strip">
                    ${g.info.map(i => `
                        <div class="info-card">
                            <div class="info-icon" style="background:${i.color};"><i class="fas ${i.icon}" style="color:${i.iconColor};font-size:14px;"></i></div>
                            <div><div class="info-label">${i.label}</div><div class="info-value">${i.value}</div></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        renderContent();
    </script>
</body>
</html>
